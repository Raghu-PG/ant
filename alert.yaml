# # =============================================================================
#  oss-ultimate-agentic-ai.prod-ami.rules.yaml
#
#  WHAT THIS FILE IS
#  -----------------
#  Prometheus alerting + recording rules for the Azure Cosmos DB account `ossultimateprod13db-cosmos` that backs the Ultimate Agentic AI platform, plus the platform's other existing infrastructure alerts.
#
#  HOW THE FILE IS ORGANISED  (three groups, top to bottom)
#  --------------------------------------------------------
#    LAYER A  Recording rules  - pre-computed helper metrics (baselines, z-scores, etc.). They do the heavy math once so the alerts below stay simple and cheap.
#    LAYER B  Cosmos alerts     - the six Cosmos DB alerts (this is the focus of this file).
#    LAYER C  Existing alerts   - unrelated platform alerts (App Service, Redis, cluster, pods, Databricks), unchanged.
#
#  THE THREE KINDS OF COSMOS ALERT
#  ----------------------------------------------------------
#    1. ANOMALY (predictive)  - "this operation is behaving unusually for itself". Compares each operation against its OWN recent history using a z-score, so it can spot a Read going from 0.6 ms to 30 ms even though 30 ms is far below any fixed limit. Early warning -> EMAIL ONLY.
#    2. STANDARD THRESHOLD     - "latency crossed a hard line we care about". Simple fixed bands (200 ms warning, 300 ms critical). Confirmed problem -> ServiceNow ticket (critical also pages).
#    3. SAFETY NETS            - heartbeat (is the metric even flowing?) and service-availability dip. Threshold-style -> ServiceNow ticket.
#
#  NAMING CONVENTION  (the suffix tells you the alert type at a glance)
#  -------------------------------------------------------------------
#    _ANOMALY     -> statistical / baseline-deviation detector
#    _STD_THRESH  -> fixed-threshold / hard-failure detector
#
#  ROUTING  (severity decides where an alert goes)
#  -----------------------------------------------
#    Severity   Alert name                                   Routes to
#    --------   ----------                                   ---------
#    Low        B1  CosmosDB_Latency_ANOMALY                 EMAIL ONLY
#    Low        B2  CosmosDB_Latency_WoW_ANOMALY             EMAIL ONLY
#    Warning    B3  CosmosDB_PointOpLatency_Warning_STD_THRESH   SNOW ticket (no page)
#    Critical   B4  CosmosDB_PointOpLatency_Critical_STD_THRESH  SNOW ticket + PAGE (P1)
#    Warning    B5  CosmosDB_LatencyMetricMissing_STD_THRESH     SNOW ticket (safety net)
#    Warning    B6  CosmosDB_ServiceAvailability_STD_THRESH      SNOW ticket
#
#    The mechanism: Low-severity alerts carry only the basic notification labels, so Spyglass just emails them. Warning/Critical alerts ALSO carry `conveyor_route: universal_connector` + the `snow_*` labels, which is what tells Spyglass to open a ServiceNow incident. Email is the early-warning channel; ServiceNow is the action channel; the pager is the emergency one.
# =============================================================================

groups:

  # ===========================================================================
  # LAYER A   RECORDING RULES
  #
  # A "recording rule" pre-computes a query and stores the result as its own new metric, refreshed here once per minute. The alerts in Layer B then read these ready-made metrics instead of doing the heavy statistics live.
  # Why this matters: the z-score needs a rolling average and a rolling
  # standard deviation over many hours/days of data. Computing that inside an
  # alert on every evaluation would be slow and, for some shapes, not even
  # valid PromQL. Pre-computing it here keeps the alerts fast and correct.
  #
  # Naming pattern: `cosmos:<thing>:<window>` (a colon-separated label so it is
  # easy to recognise these derived series at a glance).
  # ===========================================================================
  - name: oss-ultimate-agentic-ai.cosmos.recording.rules
    interval: 1m
    rules:

      # A1. CURRENT LATENCY, per operation type.
      # The live latency for each operation (Read, Create, Replace, Upsert,
      # Update), one series each. `max by (...)` collapses any duplicate
      # underlying series (e.g. per region) into a single value per operation.
      # This is the raw input every other recording rule builds on.
      - record: cosmos:op_latency:5m
        expr: |
          max by (resourceName, dimension_operationtype) (
            azure_documentdb_databaseaccounts_serversidelatency_milliseconds_average{
              resourceName="ossultimateprod13db-cosmos",
              dimension_operationtype=~"Create|Read|Replace|Upsert|Update"
            }
          )

      # A2. WORST POINT-OP LATENCY, one number for the whole account.
      # Takes the maximum across the four fast "point" operations only. This
      # single value is what the fixed 200/300 ms threshold alerts watch.
      # Update is deliberately left out: at ~224 ms baseline it would always
      # be the maximum and would defeat the purpose of a fixed threshold.
      - record: cosmos:point_op_latency:max_5m
        expr: |
          max by (resourceName) (
            azure_documentdb_databaseaccounts_serversidelatency_milliseconds_average{
              resourceName="ossultimateprod13db-cosmos",
              dimension_operationtype=~"Create|Read|Replace|Upsert"
            }
          )

      # A3. ROLLING BASELINES — what "normal" looks like, per operation.
      # We keep two horizons so we can see both fast and slow changes:
      #   6h  = recent normal, reacts quickly to new behaviour.
      #   7d  = long-term normal, steady reference that a short spike can't
      #         distort. `mean` is the average; `stddev` is how much the value
      #         normally wobbles around that average (needed for the z-score).
      - record: cosmos:op_latency:mean_6h
        expr: avg_over_time(cosmos:op_latency:5m[6h])

      - record: cosmos:op_latency:stddev_6h
        expr: stddev_over_time(cosmos:op_latency:5m[6h])

      - record: cosmos:op_latency:mean_7d
        expr: avg_over_time(cosmos:op_latency:5m[7d])

      - record: cosmos:op_latency:stddev_7d
        expr: stddev_over_time(cosmos:op_latency:5m[7d])

      # A4. Z-SCORES — "how unusual is right now, in units of normal wobble?"
      # Formula: (current - average) / standard_deviation. A z-score of 3
      # means the value is 3 standard deviations above its own average, which
      # is statistically rare. Computed at both horizons.
      #
      # clamp_min(stddev, 2) is a safety floor: very stable operations (Read
      # barely moves) have a near-zero standard deviation, and dividing by a
      # tiny number turns a harmless 5 ms blip into a giant z-score. Forcing
      # the divisor to be at least 2 ms stops those false anomalies.
      - record: cosmos:op_latency:zscore_6h
        expr: |
          (cosmos:op_latency:5m - cosmos:op_latency:mean_6h)
          / clamp_min(cosmos:op_latency:stddev_6h, 2)

      - record: cosmos:op_latency:zscore_7d
        expr: |
          (cosmos:op_latency:5m - cosmos:op_latency:mean_7d)
          / clamp_min(cosmos:op_latency:stddev_7d, 2)

      # A5. WEEK-OVER-WEEK RATIO — catches slow, creeping drift.
      # Compares this period's 6h average to the 6h average from exactly 7
      # days ago. A ratio of 2 means latency has doubled versus the same time
      # last week. This catches gradual degradation that a rolling z-score
      # would miss, because slow drift quietly raises the baseline too.
      # clamp_min(..., 1) avoids dividing by a near-zero week-ago value.
      - record: cosmos:op_latency:wow_ratio
        expr: |
          cosmos:op_latency:mean_6h
          / clamp_min(cosmos:op_latency:mean_6h offset 7d, 1)


  # ===========================================================================
  # LAYER B   COSMOS DB ALERTS
  #
  # Six alerts that read the Layer A metrics. Two predictive (email-only),
  # two fixed-threshold (ticket / page), and two safety nets (ticket).
  # Each alert has:
  #   expr            - the condition that must be true to fire.
  #   for             - how long it must stay true before firing (filters
  #                     out brief spikes).
  #   keep_firing_for - how long it stays firing after the condition clears
  #                     (stops one incident from flapping into many tickets).
  # ===========================================================================
  - name: oss-ultimate-agentic-ai.cosmos.prod.rules
    rules:

      # =====================================================================
      # B1.  LATENCY ANOMALY  (predictive, email-only)
      #
      # Fires when an operation is behaving abnormally FOR ITSELF: its 6-hour
      # z-score is above 3 (a rare, >3-stddev deviation) AND the latency is
      # actually meaningful (> 20 ms). The 20 ms floor is important — without
      # it, a Read jumping from 0.6 ms to 8 ms is "statistically extreme" yet
      # operationally meaningless, and would page no one usefully.
      #
      # This is an EARLY WARNING. It often fires before any fixed threshold,
      # giving the team a head start. Because it is a heads-up and not a
      # confirmed problem, it emails only and never opens a ticket.
      # =====================================================================
      - alert: CosmosDB_Latency_ANOMALY
        expr: |
          cosmos:op_latency:zscore_6h > 3
          and
          cosmos:op_latency:5m > 20
        for: 15m
        keep_firing_for: 15m
        labels:
          severity: "Low"
          alert_namespace: oss-ultimate-agentic-ai
          alert_name: "CosmosDB_Latency_ANOMALY"
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'PREDICTIVE: Cosmos DB {{$labels.dimension_operationtype}} latency anomaly - {{$labels.resourceName}}'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
        annotations:
          summary: 'Cosmos DB {{$labels.dimension_operationtype}} latency is statistically anomalous vs its 6h baseline'
          message: >-
            PREDICTIVE: Cosmos DB operation {{$labels.dimension_operationtype}}
            on {{$labels.resourceName}} is more than 3 standard deviations
            ({{$value | printf "%.1f"}}σ) above its 6-hour rolling baseline and
            has stayed there for 15 minutes. This is a statistical anomaly, not
            yet an SLA breach, but it usually precedes one. Investigate
            proactively: (1) Azure Insights -> Latency split by OperationType
            for this op; (2) Insights -> Storage for hot-partition skew;
            (3) recent deploys, query-shape changes, indexing-policy edits.
            If the Warning or Critical tier follows within 30 minutes, the
            prediction has been confirmed.

      # =====================================================================
      # B2.  WEEK-OVER-WEEK LATENCY CREEP  (predictive, email-only)
      #
      # Catches SLOW degradation that the z-score can miss. If latency rises
      # gradually over days, the rolling 6-hour baseline quietly rises with
      # it, so the z-score never looks unusual. Comparing against the same
      # time exactly one week ago sidesteps that: a ratio above 2 means
      # latency has more than doubled versus last week.
      #
      # The `mean_6h > 50` guard stops it firing on trivially small numbers
      # (doubling from 1 ms to 2 ms is still 2x but means nothing). Like B1,
      # this is a heads-up, so it emails only.
      # =====================================================================
      - alert: CosmosDB_Latency_WoW_ANOMALY
        expr: |
          cosmos:op_latency:wow_ratio > 2
          and
          cosmos:op_latency:mean_6h > 50
        for: 30m
        keep_firing_for: 30m
        labels:
          severity: "Low"
          alert_namespace: oss-ultimate-agentic-ai
          alert_name: "CosmosDB_Latency_WoW_ANOMALY"
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'PREDICTIVE: Cosmos DB WoW latency creep - {{$labels.dimension_operationtype}} - {{$labels.resourceName}}'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
        annotations:
          summary: 'Cosmos DB {{$labels.dimension_operationtype}} latency is more than 2x higher than the same hour last week'
          message: >-
            Cosmos DB operation {{$labels.dimension_operationtype}} on
            {{$labels.resourceName}} is {{$value | printf "%.1fx"}} higher
            than the same hour last week (smoothed baseline). Slow drift in
            progress; review capacity, data growth (Storage tab), and recent
            code / index changes. Not urgent but worth scheduling a look.

      # =====================================================================
      # B3.  POINT-OP LATENCY ELEVATED  (warning threshold, SNOW ticket)
      #
      # The first hard line. Fires when the worst point-op latency sits in
      # the 200–300 ms band for 15 minutes. 200 ms is comfortably above the
      # account's normal busy-hour peak, so healthy traffic does not trip it,
      # but it is well short of an outage.
      #
      # The `unless (... > 300)` clause means: only fire in the WARNING band.
      # Once latency passes 300 ms, B4 (critical) takes over and this one
      # steps aside, so a single problem never produces two overlapping
      # tickets. Opens a ServiceNow ticket but does not page.
      # =====================================================================
      - alert: CosmosDB_PointOpLatency_Warning_STD_THRESH
        expr: |
          (cosmos:point_op_latency:max_5m > 200)
          unless
          (cosmos:point_op_latency:max_5m > 300)
        for: 15m
        keep_firing_for: 10m
        labels:
          severity: "Warning"
          alert_namespace: oss-ultimate-agentic-ai
          alert_name: "CosmosDB_PointOpLatency_Warning_STD_THRESH"
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'WARNING: Cosmos DB point-op latency elevated - {{$labels.resourceName}}'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
          # --- SNOW ticket routing (Warning -> ServiceNow incident, no page) ---
          conveyor_route: universal_connector
          actionability_type: incident,email
          alert_actionable: 'true'
          snow_short_description: 'CosmosDB_PointOpLatency_Warning_STD_THRESH - {{$labels.resourceName}}'
          snow_description: 'Cosmos DB point-operation latency sustained above 200ms (warning band 200-300ms) for 15m on {{$labels.resourceName}}.'
          snow_configuration_item: One Supply Services - Ultimate Agentic AI Platform
          snow_assignment_group: DevOps_AdvAnalytApps
          snow_business_service: D&A AI ENGINEERING SERVICES
          snow_service_offering: D&A AI Eng
          snow_category: Business Application & Databases
          snow_subcategory: Business Applications
          snow_component: Alerts
          snow_contact_type: Auto Ticket
          snow_location: ALL LOCATIONS
          snow_incident_type: 'Operations: Application Availability'
          snow_is_cbp_impacted: 'No'
          snow_impact: '3'
          snow_urgency: '3'
        annotations:
          summary: 'Cosmos DB point-op latency above 200ms (warning band) for 15 minutes'
          message: >-
            Cosmos DB point-operation latency on {{$labels.resourceName}} has
            sustained above 200 ms for 15 minutes (normal-peak Upsert is
            ~145 ms on the deprecated metric, ~120 ms on Gateway). Look at
            the Z-score dashboard for which op is contributing, RU/s
            consumption, and any recent deploys. No paging action unless the
            Critical alert also fires.

      # =====================================================================
      # B4.  POINT-OP LATENCY CRITICAL  (critical threshold, SNOW + PAGE)
      #
      # The serious line. Fires when the worst point-op latency stays above
      # 300 ms (roughly double the normal busy-hour peak) for 10 minutes —
      # at this point users are likely feeling it. The window is a little
      # shorter than the warning's because, once this high, we want to know
      # quickly. Opens a P1 ServiceNow incident AND pages the on-call.
      # =====================================================================
      - alert: CosmosDB_PointOpLatency_Critical_STD_THRESH
        expr: cosmos:point_op_latency:max_5m > 300
        for: 10m
        keep_firing_for: 10m
        labels:
          severity: "Critical"
          alert_namespace: oss-ultimate-agentic-ai
          alert_name: "CosmosDB_PointOpLatency_Critical_STD_THRESH"
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'CRITICAL: Cosmos DB point-op latency - {{$labels.resourceName}}'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
          # --- SNOW ticket routing (Critical -> ServiceNow incident + PAGE, P1) ---
          conveyor_route: universal_connector
          actionability_type: incident,email
          alert_actionable: 'true'
          snow_short_description: 'CosmosDB_PointOpLatency_Critical_STD_THRESH - {{$labels.resourceName}}'
          snow_description: 'Cosmos DB point-operation latency sustained above 300ms for 10m on {{$labels.resourceName}}. User impact likely - paging on-call.'
          snow_configuration_item: One Supply Services - Ultimate Agentic AI Platform
          snow_assignment_group: DevOps_AdvAnalytApps
          snow_business_service: D&A AI ENGINEERING SERVICES
          snow_service_offering: D&A AI Eng
          snow_category: Business Application & Databases
          snow_subcategory: Business Applications
          snow_component: Alerts
          snow_contact_type: Auto Ticket
          snow_location: ALL LOCATIONS
          snow_incident_type: 'Operations: Application Availability'
          snow_is_cbp_impacted: 'No'
          snow_impact: '1'
          snow_urgency: '1'
        annotations:
          summary: 'Cosmos DB point-op latency above 300ms (critical) for 10 minutes — user impact likely'
          message: >-
            Cosmos DB point-operation latency on {{$labels.resourceName}}
            has sustained above 300 ms for 10 minutes — roughly 2x normal
            peak. User impact likely. Runbook: (1) confirm 429/throttling
            via Insights -> Requests; (2) inspect Normalized RU Consumption
            split by PartitionKeyRangeId for a hot partition; (3) confirm no
            regional failover/maintenance; (4) review recent deploys, query
            patterns and indexing-policy changes.

      # =====================================================================
      # B5.  LATENCY METRIC MISSING  (heartbeat safety net, SNOW ticket)
      #
      # Every alert above depends on the Layer A recording rules producing
      # values. If the metric stops flowing (a broken scrape, a crashed
      # exporter, a renamed label), those alerts would go silently blind —
      # the most dangerous failure in monitoring, because everything looks
      # "green" while nothing is actually being watched.
      #
      # `absent(...)` returns 1 exactly when the aggregate metric has no data.
      # If that persists for 15 minutes, this fires so a human can fix the
      # pipeline. It is the alarm that watches the alarms.
      # =====================================================================
      - alert: CosmosDB_LatencyMetricMissing_STD_THRESH
        expr: absent(cosmos:point_op_latency:max_5m)
        for: 15m
        labels:
          severity: "Warning"
          alert_namespace: oss-ultimate-agentic-ai
          alert_name: "CosmosDB_LatencyMetricMissing_STD_THRESH"
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'Cosmos DB latency metric missing - alerts are blind'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
          # --- SNOW ticket routing (Warning -> ServiceNow incident, safety net) ---
          conveyor_route: universal_connector
          actionability_type: incident,email
          alert_actionable: 'true'
          snow_short_description: 'CosmosDB_LatencyMetricMissing_STD_THRESH'
          snow_description: 'Cosmos DB latency aggregate (cosmos:point_op_latency:max_5m) absent for 15m - z-score and threshold alerts are blind.'
          snow_configuration_item: One Supply Services - Ultimate Agentic AI Platform
          snow_assignment_group: DevOps_AdvAnalytApps
          snow_business_service: D&A AI ENGINEERING SERVICES
          snow_service_offering: D&A AI Eng
          snow_category: Business Application & Databases
          snow_subcategory: Business Applications
          snow_component: Alerts
          snow_contact_type: Auto Ticket
          snow_location: ALL LOCATIONS
          snow_incident_type: 'Operations: Application Availability'
          snow_is_cbp_impacted: 'No'
          snow_impact: '3'
          snow_urgency: '3'
        annotations:
          summary: 'Cosmos DB latency aggregate has been absent for 15 minutes — alerts are blind'
          message: >-
            The Cosmos DB latency aggregate (cosmos:point_op_latency:max_5m)
            has been absent for 15 minutes. The Z-score and threshold alerts
            for ossultimateprod13db-cosmos are now blind. Check the Spyglass
            scrape, the Azure metrics exporter, and the recording rules.

      # =====================================================================
      # B6.  SERVICE AVAILABILITY DIP  (safety net, SNOW ticket)
      #
      # Latency tells us how SLOW Cosmos is; availability tells us how OFTEN
      # it is actually answering. This watches Azure's own service-
      # availability percentage, averaged over the last hour, and fires if it
      # slips below 99.9%. That is a direct signal of a Cosmos-side problem
      # (throttling, regional issue, outage) rather than a latency symptom.
      # =====================================================================
      - alert: CosmosDB_ServiceAvailability_STD_THRESH
        expr: |
          avg_over_time(
            azure_documentdb_databaseaccounts_serviceavailability_percent_average{
              resourceName="ossultimateprod13db-cosmos"
            }[1h]
          ) < 99.9
        for: 15m
        labels:
          severity: "Warning"
          alert_namespace: oss-ultimate-agentic-ai
          alert_name: "CosmosDB_ServiceAvailability_STD_THRESH"
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'Cosmos DB service availability dip - {{$labels.resourceName}}'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
          # --- SNOW ticket routing (Warning -> ServiceNow incident) ---
          conveyor_route: universal_connector
          actionability_type: incident,email
          alert_actionable: 'true'
          snow_short_description: 'CosmosDB_ServiceAvailability_STD_THRESH - {{$labels.resourceName}}'
          snow_description: 'Cosmos DB service availability averaged below 99.9% over the past hour on {{$labels.resourceName}}.'
          snow_configuration_item: One Supply Services - Ultimate Agentic AI Platform
          snow_assignment_group: DevOps_AdvAnalytApps
          snow_business_service: D&A AI ENGINEERING SERVICES
          snow_service_offering: D&A AI Eng
          snow_category: Business Application & Databases
          snow_subcategory: Business Applications
          snow_component: Alerts
          snow_contact_type: Auto Ticket
          snow_location: ALL LOCATIONS
          snow_incident_type: 'Operations: Application Availability'
          snow_is_cbp_impacted: 'No'
          snow_impact: '3'
          snow_urgency: '3'
        annotations:
          summary: 'Cosmos DB service availability averaged below 99.9% over the past hour'
          message: >-
            Cosmos DB service availability for {{$labels.resourceName}}
            averaged below 99.9% over the past hour. Compare against the
            Azure Service Health blade for any reported incidents.

  - name: oss-ultimate-agentic-ai.prod.rules
    rules:
      - alert: App Service CPU Utilization
        expr: azure_web_sites_cputime_seconds_total{resourceName="ossultimateprod13wa"} > .7
        for: 5m
        labels:
          alert_namespace: oss-ultimate-agentic-ai
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'App Service high CPU utilization - {{$labels.resourceName}}'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
        annotations:
          message: 'The CPU utilization for App Service instance {{$labels.resourceName}} is higher than 0.5. Investigate immediately.'

      - alert: Redis Heartbeat
        expr: absent(ami_metric_present{resourceType="microsoft.cache/redis", resourceName="ossultimateprod13redis"})
        for: 1m
        labels:
          alert_namespace: oss-ultimate-agentic-ai
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'Azure Redis Cache heartbeat issue - {{$labels.resourceName}}'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
        annotations:
          message: 'The heartbeat for Azure Redis Cache instance {{$labels.resourceName}} is not equal to 1. Investigate immediately.'

      - alert: Cluster High CPU Utilization
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{cluster=~"aks-aif-mt-prod-12-ecc6", mode="idle"}[2m])) * 100) > 85
        for: 5m
        labels:
          alert_namespace: oss-ultimate-agentic-ai
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'Node High CPU Usage - {{$labels.resourceName}}'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
        annotations:
          message: 'Node {{$labels.node}} has been detected that it currently has a high CPU usage < 85% of the allocated CPU - {{$labels.cluster}}.'

      - alert: Pod Crash Looping
        expr: increase(kube_pod_container_status_restarts_total{cluster=~"aks-aif-mt-prod-12-ecc6"}[3m]) > 3
        for: 3m
        labels:
          alert_namespace: oss-ultimate-agentic-ai
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'Pod Crash Looping - {{$labels.pod}}'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
        annotations:
          message: 'Pod {{$labels.pod}} is crash looping.'

      - alert: Databricks Workspace Down
        expr: databricks_workspace_up{workspace=~"adbuvamain-prd"} != 1
        for: 10m
        labels:
          alert_namespace: oss-genai-ultimate-virtual-a
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-genai-ultimate-virtual-a
          email_subject: '{{$labels.resourceName}} Workspace Down'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
        annotations:
