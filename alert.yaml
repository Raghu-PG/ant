# =============================================================================
# oss-ultimate-agentic-ai.prod-ami.rules.yaml  —  Prometheus rules for the
# Cosmos DB account ossultimateprod13db-cosmos and the Ultimate Agentic AI platform.
#
# Groups: (A) Cosmos recording  (B) Cosmos alerts  (A2) CPU recording  (C) Platform alerts.
# Suffix _ANOMALY = z-score predictive (Low → EMAIL only).
# Suffix _STD_THRESH = fixed threshold (Warning → SNOW ticket; Critical → ticket + PAGE).
# Low severity carries basic labels (email); Warning/Critical also carry
# `conveyor_route: universal_connector` + `snow_*` labels (Spyglass opens SNOW incident).
#
# Routing:    Low → EMAIL   |   Warning → SNOW   |   Critical → SNOW + PAGE (P1)
# =============================================================================
groups:
  # ===== LAYER A — Cosmos recording rules (pre-computed baselines, z-scores, WoW ratio) =====
  - name: oss-ultimate-agentic-ai.cosmos.recording.rules
    interval: 1m
    rules:
      # Live latency per op type — input for every other rule. `max by` collapses duplicate per-region series.
      - record: cosmos:op_latency:5m
        expr: |
          max by (resourceName, dimension_operationtype) (
            azure_documentdb_databaseaccounts_serversidelatency_milliseconds_average{
              resourceName="ossultimateprod13db-cosmos",
              dimension_operationtype=~"Create|Read|Replace|Upsert|Update"
            }
          )
      # Max across the four point ops (Update excluded — its 224ms baseline would always dominate `max`).
      - record: cosmos:point_op_latency:max_5m
        expr: |
          max by (resourceName) (
            azure_documentdb_databaseaccounts_serversidelatency_milliseconds_average{
              resourceName="ossultimateprod13db-cosmos",
              dimension_operationtype=~"Create|Read|Replace|Upsert"
            }
          )
      # 6h baseline (reacts quickly) + 7d baseline (stable long-term reference).
      - record: cosmos:op_latency:mean_6h
        expr: avg_over_time(cosmos:op_latency:5m[6h])
      - record: cosmos:op_latency:stddev_6h
        expr: stddev_over_time(cosmos:op_latency:5m[6h])
      - record: cosmos:op_latency:mean_7d
        expr: avg_over_time(cosmos:op_latency:5m[7d])
      - record: cosmos:op_latency:stddev_7d
        expr: stddev_over_time(cosmos:op_latency:5m[7d])
      # Z-score = (current - mean) / stddev.  clamp_min(stddev, 2) stops near-zero stddev (stable ops) from
      # turning a tiny absolute blip into a huge z. Read at 0.66ms with stddev ~0.1 would otherwise be noisy.
      - record: cosmos:op_latency:zscore_6h
        expr: |
          (cosmos:op_latency:5m - cosmos:op_latency:mean_6h)
          / clamp_min(cosmos:op_latency:stddev_6h, 2)
      - record: cosmos:op_latency:zscore_7d
        expr: |
          (cosmos:op_latency:5m - cosmos:op_latency:mean_7d)
          / clamp_min(cosmos:op_latency:stddev_7d, 2)
      # Week-over-week ratio — catches slow drift the rolling z-score absorbs into its own baseline.
      - record: cosmos:op_latency:wow_ratio
        expr: |
          cosmos:op_latency:mean_6h
          / clamp_min(cosmos:op_latency:mean_6h offset 7d, 1)
  # ===== LAYER B — Cosmos DB alerts =====
  - name: oss-ultimate-agentic-ai.cosmos.prod.rules
    rules:
      # B1.  Predictive (email-only): op's 6h z-score > 3 AND latency > 20ms (operationally meaningful).
      - alert: CosmosDB_Latency_ANOMALY
        expr: |
          cosmos:op_latency:zscore_6h > 3
          and
          cosmos:op_latency:5m > 20
        for: 15m
        keep_firing_for: 15m
        labels:
          severity: "Low"
          alert_namespace: oss-ultimate-agentic-ai
          alert_name: "CosmosDB_Latency_ANOMALY"
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'PREDICTIVE: Cosmos DB {{$labels.dimension_operationtype}} latency anomaly - {{$labels.resourceName}}'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
        annotations:
          summary: 'Cosmos DB {{$labels.dimension_operationtype}} latency is statistically anomalous vs its 6h baseline'
          message: >-
            PREDICTIVE: Cosmos DB operation {{$labels.dimension_operationtype}}
            on {{$labels.resourceName}} is more than 3 standard deviations
            ({{$value | printf "%.1f"}}σ) above its 6-hour rolling baseline and
            has stayed there for 15 minutes. This is a statistical anomaly, not
            yet an SLA breach, but it usually precedes one. Investigate
            proactively: (1) Azure Insights -> Latency split by OperationType
            for this op; (2) Insights -> Storage for hot-partition skew;
            (3) recent deploys, query-shape changes, indexing-policy edits.
            If the Warning or Critical tier follows within 30 minutes, the
            prediction has been confirmed.
      # B2.  Predictive (email-only): WoW ratio > 2x AND mean_6h > 50ms. Catches slow drift over days.
      - alert: CosmosDB_Latency_WoW_ANOMALY
        expr: |
          cosmos:op_latency:wow_ratio > 2
          and
          cosmos:op_latency:mean_6h > 50
        for: 30m
        keep_firing_for: 30m
        labels:
          severity: "Low"
          alert_namespace: oss-ultimate-agentic-ai
          alert_name: "CosmosDB_Latency_WoW_ANOMALY"
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'PREDICTIVE: Cosmos DB WoW latency creep - {{$labels.dimension_operationtype}} - {{$labels.resourceName}}'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
        annotations:
          summary: 'Cosmos DB {{$labels.dimension_operationtype}} latency is more than 2x higher than the same hour last week'
          message: >-
            Cosmos DB operation {{$labels.dimension_operationtype}} on
            {{$labels.resourceName}} is {{$value | printf "%.1fx"}} higher
            than the same hour last week (smoothed baseline). Slow drift in
            progress; review capacity, data growth (Storage tab), and recent
            code / index changes. Not urgent but worth scheduling a look.
      # B3.  Warning threshold (SNOW ticket): point-op max in 200-300ms band. `unless`> 300 prevents overlap with B4.
      - alert: CosmosDB_PointOpLatency_Warning_STD_THRESH
        expr: |
          (cosmos:point_op_latency:max_5m > 200)
          unless
          (cosmos:point_op_latency:max_5m > 300)
        for: 15m
        keep_firing_for: 10m
        labels:
          severity: "Warning"
          alert_namespace: oss-ultimate-agentic-ai
          alert_name: "CosmosDB_PointOpLatency_Warning_STD_THRESH"
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'WARNING: Cosmos DB point-op latency elevated - {{$labels.resourceName}}'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
          conveyor_route: universal_connector
          actionability_type: incident,email
          alert_actionable: 'true'
          snow_short_description: 'CosmosDB_PointOpLatency_Warning_STD_THRESH - {{$labels.resourceName}}'
          snow_description: 'Cosmos DB point-operation latency sustained above 200ms (warning band 200-300ms) for 15m on {{$labels.resourceName}}.'
          snow_configuration_item: One Supply Services - Ultimate Agentic AI Platform
          snow_assignment_group: DevOps_AdvAnalytApps
          snow_business_service: D&A AI ENGINEERING SERVICES
          snow_service_offering: D&A AI Eng
          snow_category: Business Application & Databases
          snow_subcategory: Business Applications
          snow_component: Alerts
          snow_contact_type: Auto Ticket
          snow_location: ALL LOCATIONS
          snow_incident_type: 'Operations: Application Availability'
          snow_is_cbp_impacted: 'No'
          snow_impact: '3'
          snow_urgency: '3'
        annotations:
          summary: 'Cosmos DB point-op latency above 200ms (warning band) for 15 minutes'
          message: >-
            Cosmos DB point-operation latency on {{$labels.resourceName}} has
            sustained above 200 ms for 15 minutes (normal-peak Upsert is
            ~145 ms on the deprecated metric, ~120 ms on Gateway). Look at
            the Z-score dashboard for which op is contributing, RU/s
            consumption, and any recent deploys. No paging action unless the
            Critical alert also fires.
      # B4.  Critical threshold (SNOW ticket + P1 page): point-op max > 300ms for 10m. User impact likely.
      - alert: CosmosDB_PointOpLatency_Critical_STD_THRESH
        expr: cosmos:point_op_latency:max_5m > 300
        for: 10m
        keep_firing_for: 10m
        labels:
          severity: "Critical"
          alert_namespace: oss-ultimate-agentic-ai
          alert_name: "CosmosDB_PointOpLatency_Critical_STD_THRESH"
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'CRITICAL: Cosmos DB point-op latency - {{$labels.resourceName}}'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
          conveyor_route: universal_connector
          actionability_type: incident,email
          alert_actionable: 'true'
          snow_short_description: 'CosmosDB_PointOpLatency_Critical_STD_THRESH - {{$labels.resourceName}}'
          snow_description: 'Cosmos DB point-operation latency sustained above 300ms for 10m on {{$labels.resourceName}}. User impact likely - paging on-call.'
          snow_configuration_item: One Supply Services - Ultimate Agentic AI Platform
          snow_assignment_group: DevOps_AdvAnalytApps
          snow_business_service: D&A AI ENGINEERING SERVICES
          snow_service_offering: D&A AI Eng
          snow_category: Business Application & Databases
          snow_subcategory: Business Applications
          snow_component: Alerts
          snow_contact_type: Auto Ticket
          snow_location: ALL LOCATIONS
          snow_incident_type: 'Operations: Application Availability'
          snow_is_cbp_impacted: 'No'
          snow_impact: '1'
          snow_urgency: '1'
        annotations:
          summary: 'Cosmos DB point-op latency above 300ms (critical) for 10 minutes — user impact likely'
          message: >-
            Cosmos DB point-operation latency on {{$labels.resourceName}}
            has sustained above 300 ms for 10 minutes — roughly 2x normal
            peak. User impact likely. Runbook: (1) confirm 429/throttling
            via Insights -> Requests; (2) inspect Normalized RU Consumption
            split by PartitionKeyRangeId for a hot partition; (3) confirm no
            regional failover/maintenance; (4) review recent deploys, query
            patterns and indexing-policy changes.
      # B5.  Heartbeat safety net (SNOW ticket): the aggregate metric is absent for 15m -> alerts are blind.
      - alert: CosmosDB_LatencyMetricMissing_STD_THRESH
        expr: absent(cosmos:point_op_latency:max_5m)
        for: 15m
        labels:
          severity: "Warning"
          alert_namespace: oss-ultimate-agentic-ai
          alert_name: "CosmosDB_LatencyMetricMissing_STD_THRESH"
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'Cosmos DB latency metric missing - alerts are blind'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
          conveyor_route: universal_connector
          actionability_type: incident,email
          alert_actionable: 'true'
          snow_short_description: 'CosmosDB_LatencyMetricMissing_STD_THRESH'
          snow_description: 'Cosmos DB latency aggregate (cosmos:point_op_latency:max_5m) absent for 15m - z-score and threshold alerts are blind.'
          snow_configuration_item: One Supply Services - Ultimate Agentic AI Platform
          snow_assignment_group: DevOps_AdvAnalytApps
          snow_business_service: D&A AI ENGINEERING SERVICES
          snow_service_offering: D&A AI Eng
          snow_category: Business Application & Databases
          snow_subcategory: Business Applications
          snow_component: Alerts
          snow_contact_type: Auto Ticket
          snow_location: ALL LOCATIONS
          snow_incident_type: 'Operations: Application Availability'
          snow_is_cbp_impacted: 'No'
          snow_impact: '3'
          snow_urgency: '3'
        annotations:
          summary: 'Cosmos DB latency aggregate has been absent for 15 minutes — alerts are blind'
          message: >-
            The Cosmos DB latency aggregate (cosmos:point_op_latency:max_5m)
            has been absent for 15 minutes. The Z-score and threshold alerts
            for ossultimateprod13db-cosmos are now blind. Check the Spyglass
            scrape, the Azure metrics exporter, and the recording rules.
      # B6.  Service-availability dip (SNOW ticket): Azure-reported availability avg < 99.9% over 1h.
      - alert: CosmosDB_ServiceAvailability_STD_THRESH
        expr: |
          avg_over_time(
            azure_documentdb_databaseaccounts_serviceavailability_percent_average{
              resourceName="ossultimateprod13db-cosmos"
            }[1h]
          ) < 99.9
        for: 15m
        labels:
          severity: "Warning"
          alert_namespace: oss-ultimate-agentic-ai
          alert_name: "CosmosDB_ServiceAvailability_STD_THRESH"
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'Cosmos DB service availability dip - {{$labels.resourceName}}'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
          conveyor_route: universal_connector
          actionability_type: incident,email
          alert_actionable: 'true'
          snow_short_description: 'CosmosDB_ServiceAvailability_STD_THRESH - {{$labels.resourceName}}'
          snow_description: 'Cosmos DB service availability averaged below 99.9% over the past hour on {{$labels.resourceName}}.'
          snow_configuration_item: One Supply Services - Ultimate Agentic AI Platform
          snow_assignment_group: DevOps_AdvAnalytApps
          snow_business_service: D&A AI ENGINEERING SERVICES
          snow_service_offering: D&A AI Eng
          snow_category: Business Application & Databases
          snow_subcategory: Business Applications
          snow_component: Alerts
          snow_contact_type: Auto Ticket
          snow_location: ALL LOCATIONS
          snow_incident_type: 'Operations: Application Availability'
          snow_is_cbp_impacted: 'No'
          snow_impact: '3'
          snow_urgency: '3'
        annotations:
          summary: 'Cosmos DB service availability averaged below 99.9% over the past hour'
          message: >-
            Cosmos DB service availability for {{$labels.resourceName}}
            averaged below 99.9% over the past hour. Compare against the
            Azure Service Health blade for any reported incidents.
  # ===== LAYER A2 — CPU recording rules (same z-score pattern as Layer A, for App Service + AKS nodes) =====
  - name: oss-ultimate-agentic-ai.cpu.recording.rules
    interval: 1m
    rules:
      # App Service CPU — preserves the original `cputime_seconds_total` semantic (no rate()) so the C2 threshold
      # behaviour is unchanged. clamp_min(stddev, 0.05) is the noise floor for this signal's scale.
      - record: appsvc:cputime:5m
        expr: |
          max by (resourceName) (
            azure_web_sites_cputime_seconds_total{resourceName="ossultimateprod13wa"}
          )
      - record: appsvc:cputime:mean_6h
        expr: avg_over_time(appsvc:cputime:5m[6h])
      - record: appsvc:cputime:stddev_6h
        expr: stddev_over_time(appsvc:cputime:5m[6h])
      - record: appsvc:cputime:zscore_6h
        expr: |
          (appsvc:cputime:5m - appsvc:cputime:mean_6h)
          / clamp_min(appsvc:cputime:stddev_6h, 0.05)
      # AKS node CPU % — `100 - rate(idle)*100`. Uses 5m rate window (smoother than the original 2m). C6 reads this.
      # clamp_min(stddev, 3) is the noise floor for percentage signals.
      - record: node:cpu_pct:5m
        expr: |
          100 - (
            avg by (instance, cluster) (
              rate(node_cpu_seconds_total{cluster=~"aks-aif-mt-prod-12-ecc6", mode="idle"}[5m])
            ) * 100
          )
      - record: node:cpu_pct:mean_6h
        expr: avg_over_time(node:cpu_pct:5m[6h])
      - record: node:cpu_pct:stddev_6h
        expr: stddev_over_time(node:cpu_pct:5m[6h])
      - record: node:cpu_pct:zscore_6h
        expr: |
          (node:cpu_pct:5m - node:cpu_pct:mean_6h)
          / clamp_min(node:cpu_pct:stddev_6h, 3)
  # ===== LAYER C — Platform alerts (CPU now anomaly + threshold; Redis/Pod/Databricks preserved verbatim) =====
  - name: oss-ultimate-agentic-ai.prod.rules
    rules:
      # C1.  App Service CPU predictive (email-only): z>3 AND value > 0.3 (skip trivially small noise).
      - alert: AppService_CPU_ANOMALY
        expr: |
          appsvc:cputime:zscore_6h > 3
          and
          appsvc:cputime:5m > 0.3
        for: 15m
        keep_firing_for: 15m
        labels:
          severity: "Low"
          alert_namespace: oss-ultimate-agentic-ai
          alert_name: "AppService_CPU_ANOMALY"
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'PREDICTIVE: App Service CPU anomaly - {{$labels.resourceName}}'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
        annotations:
          summary: 'App Service {{$labels.resourceName}} CPU is statistically anomalous vs its 6h baseline'
          message: >-
            PREDICTIVE: App Service {{$labels.resourceName}} CPU is {{$value | printf "%.1f"}}σ above its 6h baseline
            for 15m. Early warning, not yet a threshold breach. Check recent deploys, traffic spikes, background
            jobs, scaled-down instances, or noisy neighbours.
      # C2.  App Service CPU threshold (SNOW ticket): cputime > 0.7 for 5m. Preserves original semantic; adds routing.
      - alert: AppService_CPU_Warning_STD_THRESH
        expr: appsvc:cputime:5m > 0.7
        for: 5m
        keep_firing_for: 10m
        labels:
          severity: "Warning"
          alert_namespace: oss-ultimate-agentic-ai
          alert_name: "AppService_CPU_Warning_STD_THRESH"
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'WARNING: App Service high CPU utilization - {{$labels.resourceName}}'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
          conveyor_route: universal_connector
          actionability_type: incident,email
          alert_actionable: 'true'
          snow_short_description: 'AppService_CPU_Warning_STD_THRESH - {{$labels.resourceName}}'
          snow_description: 'App Service CPU on {{$labels.resourceName}} sustained above 0.7 for 5m.'
          snow_configuration_item: One Supply Services - Ultimate Agentic AI Platform
          snow_assignment_group: DevOps_AdvAnalytApps
          snow_business_service: D&A AI ENGINEERING SERVICES
          snow_service_offering: D&A AI Eng
          snow_category: Business Application & Databases
          snow_subcategory: Business Applications
          snow_component: Alerts
          snow_contact_type: Auto Ticket
          snow_location: ALL LOCATIONS
          snow_incident_type: 'Operations: Application Availability'
          snow_is_cbp_impacted: 'No'
          snow_impact: '3'
          snow_urgency: '3'
        annotations:
          summary: 'App Service CPU above 0.7 for 5 minutes'
          message: 'The CPU utilization for App Service instance {{$labels.resourceName}} has been higher than 0.7 for 5 minutes. Investigate workload, recent deploys, and resource sizing. If the C1 anomaly alert preceded this, the prediction is confirmed.'
      # C3.  Redis heartbeat (preserved verbatim).
      - alert: Redis Heartbeat
        expr: absent(ami_metric_present{resourceType="microsoft.cache/redis", resourceName="ossultimateprod13redis"})
        for: 1m
        labels:
          alert_namespace: oss-ultimate-agentic-ai
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'Azure Redis Cache heartbeat issue - {{$labels.resourceName}}'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
        annotations:
          message: 'The heartbeat for Azure Redis Cache instance {{$labels.resourceName}} is not equal to 1. Investigate immediately.'
      # C5.  AKS node CPU predictive (email-only): z>3 AND value > 50% (only fires when node is genuinely loaded).
      - alert: AKSNode_CPU_ANOMALY
        expr: |
          node:cpu_pct:zscore_6h > 3
          and
          node:cpu_pct:5m > 50
        for: 10m
        keep_firing_for: 15m
        labels:
          severity: "Low"
          alert_namespace: oss-ultimate-agentic-ai
          alert_name: "AKSNode_CPU_ANOMALY"
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'PREDICTIVE: AKS node CPU anomaly - {{$labels.instance}} ({{$labels.cluster}})'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
        annotations:
          summary: 'AKS node {{$labels.instance}} CPU is statistically anomalous vs its 6h baseline'
          message: >-
            PREDICTIVE: AKS node {{$labels.instance}} ({{$labels.cluster}}) CPU is {{$value | printf "%.1f"}}σ above
            its 6h baseline for 10m. Early warning — check scheduling imbalance, noisy pod, recent deploy, or a
            node that needs to be cordoned.
      # C6.  AKS node CPU threshold (SNOW ticket): cpu_pct > 85 for 5m. Replaces the old "Cluster High CPU" alert.
      - alert: AKSNode_CPU_Warning_STD_THRESH
        expr: node:cpu_pct:5m > 85
        for: 5m
        keep_firing_for: 10m
        labels:
          severity: "Warning"
          alert_namespace: oss-ultimate-agentic-ai
          alert_name: "AKSNode_CPU_Warning_STD_THRESH"
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'WARNING: AKS node high CPU usage - {{$labels.instance}} ({{$labels.cluster}})'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
          conveyor_route: universal_connector
          actionability_type: incident,email
          alert_actionable: 'true'
          snow_short_description: 'AKSNode_CPU_Warning_STD_THRESH - {{$labels.instance}}'
          snow_description: 'AKS node {{$labels.instance}} in cluster {{$labels.cluster}} sustained CPU > 85% for 5m.'
          snow_configuration_item: One Supply Services - Ultimate Agentic AI Platform
          snow_assignment_group: DevOps_AdvAnalytApps
          snow_business_service: D&A AI ENGINEERING SERVICES
          snow_service_offering: D&A AI Eng
          snow_category: Business Application & Databases
          snow_subcategory: Business Applications
          snow_component: Alerts
          snow_contact_type: Auto Ticket
          snow_location: ALL LOCATIONS
          snow_incident_type: 'Operations: Application Availability'
          snow_is_cbp_impacted: 'No'
          snow_impact: '3'
          snow_urgency: '3'
        annotations:
          summary: 'AKS node CPU above 85% for 5 minutes'
          message: 'Node {{$labels.instance}} in cluster {{$labels.cluster}} has sustained CPU above 85% for 5 minutes. Investigate workload distribution, recent scheduling changes, or whether the node needs to be cordoned. If the C5 anomaly alert preceded this, the prediction is confirmed.'
      # C7.  Pod crash looping (preserved verbatim).
      - alert: Pod Crash Looping
        expr: increase(kube_pod_container_status_restarts_total{cluster=~"aks-aif-mt-prod-12-ecc6"}[3m]) > 3
        for: 3m
        labels:
          alert_namespace: oss-ultimate-agentic-ai
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
          alert_owner: sison.hm@pg.com
          name_space: oss-ultimate-agentic-ai
          email_subject: 'Pod Crash Looping - {{$labels.pod}}'
          uc_environment: prod
          correlation_rule: 'alert_name,snow_short_description'
        annotations:
          message: 'Pod {{$labels.pod}} is crash looping.'
      # C8.  Databricks workspace down (preserved verbatim).
      - alert: Databricks Workspace Down
        expr: databricks_workspace_up{workspace=~"adbuvamain-prd"} != 1
        for: 10m
        labels:
          alert_namespace: oss-genai-ultimate-virtual-a
          primary_property: instance
          secondary_property: alert_name
          source_system: spyglass
